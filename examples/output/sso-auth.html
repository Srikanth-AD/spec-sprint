<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>spec-sprint report</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-hover: #222538;
    --border: #2d3148;
    --text: #e2e4f0;
    --text-muted: #7b7f9e;
    --accent: #6366f1;
    --accent-hover: #818cf8;

    --skill-frontend: #8b5cf6;
    --skill-backend: #3b82f6;
    --skill-fullstack: #06b6d4;
    --skill-data: #f59e0b;
    --skill-infra: #6b7280;
    --skill-qa: #10b981;
    --skill-design: #ec4899;

    --pri-critical: #ef4444;
    --pri-high: #f97316;
    --pri-medium: #eab308;
    --pri-low: #22c55e;

    --pts-low: #22c55e;
    --pts-mid: #f59e0b;
    --pts-high: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent-hover); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre, .mono { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* Header */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    margin-bottom: 32px;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 32px;
    flex-wrap: wrap;
  }
  .brand {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }
  .title {
    font-size: 24px;
    font-weight: 600;
    margin: 4px 0 4px;
    color: var(--text);
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 12px;
  }
  .stats {
    display: flex;
    gap: 28px;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
  }
  .muted { color: var(--text-muted); }

  /* Spec summary */
  .spec-summary {
    font-size: 15px;
    line-height: 1.6;
  }
  .spec-toggle {
    display: inline-block;
    margin-top: 12px;
    color: var(--accent-hover);
    cursor: pointer;
    font-size: 13px;
  }
  .spec-full {
    display: none;
    margin-top: 14px;
    background: #0b0d14;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    max-height: 320px;
    overflow: auto;
    white-space: pre-wrap;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .spec-full.open { display: block; }

  /* Warnings */
  .warnings {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.4);
  }
  .warnings h2 { color: #fbbf24; }
  .warning-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(245, 158, 11, 0.15);
    font-size: 13px;
  }
  .warning-row:last-child { border-bottom: 0; }
  .warning-dismiss {
    background: none;
    border: 0;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
  }
  .warning-dismiss:hover { color: var(--text); }

  /* Assumptions / Risks */
  .ar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  .ar-card {
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 16px 20px;
  }
  .ar-card.assumptions {
    background: rgba(59, 130, 246, 0.06);
    border-color: rgba(59, 130, 246, 0.3);
  }
  .ar-card.risks {
    background: rgba(249, 115, 22, 0.06);
    border-color: rgba(249, 115, 22, 0.3);
  }
  .ar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    font-weight: 600;
  }
  .ar-card.assumptions .ar-header { color: #93c5fd; }
  .ar-card.risks .ar-header { color: #fdba74; }
  .ar-list {
    display: none;
    margin: 12px 0 0;
    padding-left: 20px;
    font-size: 13px;
    color: var(--text);
  }
  .ar-list.open { display: block; }
  .ar-list li { margin: 4px 0; }

  /* Sprint overview cards */
  .sprint-overview {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 28px;
  }
  .sprint-card {
    flex: 0 0 240px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .sprint-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .sprint-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .sprint-card-title { font-weight: 600; font-size: 14px; }
  .util-bar {
    height: 6px;
    background: #0b0d14;
    border-radius: 3px;
    overflow: hidden;
    margin: 8px 0 6px;
  }
  .util-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .util-text { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .skill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .skill-dot {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .skill-dot::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--c, var(--text-muted));
  }
  .warn-badge {
    display: inline-block;
    background: var(--pri-critical);
    color: #fff;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
  }

  /* Dependency graph */
  .graph-card { padding: 20px 24px; }
  .graph-subtitle {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 12px;
  }
  .graph-svg-wrap {
    width: 100%;
    overflow-x: auto;
    background: #0b0d14;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  svg.dep-graph {
    display: block;
    min-height: 320px;
  }
  .col-header {
    fill: var(--text-muted);
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .node-rect {
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .node-text {
    fill: var(--text);
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    pointer-events: none;
  }
  .node-title-text {
    fill: var(--text);
    font-size: 10px;
    pointer-events: none;
  }
  .edge { transition: opacity 0.2s; }
  .dim { opacity: 0.18; }

  /* Sprint sections */
  .sprint-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .sprint-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 22px;
    cursor: pointer;
    user-select: none;
    background: #161924;
    border-bottom: 1px solid var(--border);
  }
  .sprint-section-header:hover { background: var(--bg-hover); }
  .sprint-section-title {
    font-size: 16px;
    font-weight: 600;
  }
  .sprint-section-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .util-mini {
    width: 100px;
    height: 6px;
    background: #0b0d14;
    border-radius: 3px;
    overflow: hidden;
  }
  .sprint-meta {
    padding: 12px 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .sprint-warnings {
    padding: 8px 22px;
    color: #fbbf24;
    background: rgba(245, 158, 11, 0.06);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .sprint-warnings div { padding: 2px 0; }
  .sprint-body { display: block; }
  .sprint-body.collapsed { display: none; }

  /* Tables */
  table.tickets {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.tickets th, table.tickets td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  table.tickets th {
    color: var(--text-muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: #161924;
  }
  table.tickets tr:hover td { background: rgba(99, 102, 241, 0.04); }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.6;
  }
  .id-badge {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: rgba(99, 102, 241, 0.15);
    color: var(--accent-hover);
    border: 1px solid rgba(99, 102, 241, 0.4);
    cursor: pointer;
  }
  .id-badge:hover { background: rgba(99, 102, 241, 0.3); }
  .pts-badge { color: #0b0d14; }
  .pts-low { background: var(--pts-low); }
  .pts-mid { background: var(--pts-mid); }
  .pts-high { background: var(--pts-high); }
  .skill-badge { color: #fff; }
  .skill-frontend { background: var(--skill-frontend); }
  .skill-backend { background: var(--skill-backend); }
  .skill-fullstack { background: var(--skill-fullstack); }
  .skill-data { background: var(--skill-data); color: #1a1300; }
  .skill-infra { background: var(--skill-infra); }
  .skill-qa { background: var(--skill-qa); }
  .skill-design { background: var(--skill-design); }
  .pri-badge { color: #fff; }
  .pri-critical { background: var(--pri-critical); }
  .pri-high { background: var(--pri-high); }
  .pri-medium { background: var(--pri-medium); color: #1a1300; }
  .pri-low { background: var(--pri-low); color: #06210f; }

  .title-cell {
    min-width: 200px;
    cursor: pointer;
  }
  .title-cell:hover { color: var(--accent-hover); }
  .story-cell { max-width: 280px; color: var(--text-muted); cursor: help; }

  .dep-chip {
    display: inline-block;
    margin: 1px 2px;
    padding: 1px 6px;
    border-radius: 8px;
    background: rgba(99, 102, 241, 0.12);
    border: 1px solid rgba(99, 102, 241, 0.3);
    color: var(--accent-hover);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px;
    cursor: pointer;
  }
  .dep-chip:hover { background: rgba(99, 102, 241, 0.25); }

  .copy-btns {
    display: flex;
    gap: 4px;
  }
  .copy-btn {
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
    height: 28px;
    transition: all 0.15s;
  }
  .copy-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
  }
  .copy-btn.success {
    background: var(--pri-low);
    color: #06210f;
    border-color: var(--pri-low);
  }
  .copy-btn.error {
    background: var(--pri-critical);
    color: #fff;
    border-color: var(--pri-critical);
  }

  .sprint-footer-copy {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 14px 22px;
    background: #161924;
    border-top: 1px solid var(--border);
  }
  .copy-btn-large {
    padding: 8px 14px;
    height: auto;
    font-size: 12px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 640px;
    width: 100%;
    padding: 24px 28px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  }
  .modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .modal-header h3 {
    margin: 0;
    font-size: 18px;
    flex: 1;
  }
  .modal-close {
    background: none;
    border: 0;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-row {
    display: flex;
    gap: 8px;
    margin: 12px 0;
    flex-wrap: wrap;
  }
  .modal-section {
    margin: 16px 0;
  }
  .modal-section-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .modal-user-story {
    background: rgba(99, 102, 241, 0.08);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 4px;
    font-style: italic;
    color: var(--text);
  }
  .modal-ac { padding-left: 20px; margin: 8px 0; }
  .modal-ac li { margin: 6px 0; }
  .modal-rationale {
    color: var(--text-muted);
    font-style: italic;
    font-size: 12px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .modal-actions .copy-btn {
    flex: 1;
    height: auto;
    padding: 10px;
    font-size: 12px;
  }

  .footer {
    margin-top: 60px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }
  .footer div { margin: 4px 0; }
</style>
</head>

<script>
window.SPEC_SPRINT_DATA = {"specSource":"/Users/srikanthad/Documents/GitHub/spec-sprint/examples/sso-auth.md","specText":"# SSO with Google and Microsoft\n\n## Overview\n\nOur SaaS app currently uses email + bcrypt-hashed passwords with\nJWT-based session tokens. Enterprise customers have repeatedly asked\nfor SSO so they can manage user access through their existing identity\nprovider. We will add Google and Microsoft OAuth as our first SSO\noptions. SAML and Okta-specific connectors are out of scope for this\nproject.\n\n## Current Auth\n\n- Email + password (bcrypt, cost factor 12)\n- JWT sessions, 24-hour expiry, refresh tokens stored in HTTP-only cookies\n- Per-user MFA via TOTP (existing, unchanged)\n\n## OAuth Flow\n\nWe will use the standard PKCE Authorization Code flow for both\nGoogle and Microsoft. The flow:\n\n1. User clicks \"Sign in with Google\" (or Microsoft) on the login page.\n2. We redirect to the IdP authorization endpoint with PKCE challenge.\n3. IdP redirects back to our callback with an authorization code.\n4. We exchange the code (with verifier) for an ID token and access token.\n5. We validate the ID token signature and claims.\n6. We look up the user by email; create one if it doesn't exist.\n7. We issue our standard JWT session.\n\n## Account Linking\n\nIf a user signs in via SSO with an email that already exists in our\nsystem as a password account, we should:\n\n- Detect the conflict.\n- Prompt the user: \"An account with this email already exists.\n  Sign in with your password to link your accounts.\"\n- After successful password sign-in, link the SSO identity to the\n  existing user record.\n- On future SSO sign-ins, log them in directly.\n\nExisting users who want to add SSO can do so from their account\nsettings page.\n\n## Admin Controls\n\nOrg admins should be able to:\n\n- Enable / disable SSO providers per organization.\n- Force SSO for an organization (disables password sign-in for all\n  members of that org).\n- View an audit log of all auth events for their org.\n\n## Session Handling\n\nWhen a user signs in via SSO, our session expires when the IdP's\nID token expires (or after our default 24-hour limit, whichever\nis shorter). On expiry, the user is prompted to re-authenticate\nthrough their IdP.\n\n## Security\n\nAll auth events must be written to an audit log:\n- Successful sign-ins (with provider, IP, user agent)\n- Failed sign-ins\n- Account linking events\n- Admin SSO config changes\n\n## Out of Scope\n\n- SAML 2.0\n- Okta-specific connectors\n- Custom IdP support\n- SCIM provisioning\n","config":{"teamSize":4,"velocity":32,"sprintDays":10,"sprintName":"Q2 Sprint 1","teamName":"Auth Squad","skills":["frontend","backend","fullstack","data","infra","qa","design"],"anthropicApiKey":"","model":"claude-sonnet-4-6"},"decomposition":{"specSummary":"This project adds Google and Microsoft OAuth SSO (PKCE Authorization Code flow) to an existing email/password SaaS app. It includes account linking for users with existing password accounts, org-level admin controls to enable/force SSO per organization, and a comprehensive auth event audit log. SAML, Okta, SCIM, and custom IdP support are explicitly out of scope.","epics":[{"id":"EP-1","title":"Data Model & Infrastructure","description":"Database schema changes, migrations, and backend infrastructure needed to support SSO identities, org SSO config, and the audit log.","ticketIds":["SS-1","SS-2"],"totalPoints":5,"sprintSpan":1},{"id":"EP-2","title":"OAuth Core: Google & Microsoft PKCE Flow","description":"Backend implementation of the PKCE Authorization Code flow for both Google and Microsoft, including token exchange, validation, and session issuance.","ticketIds":["SS-3","SS-4","SS-5","SS-6"],"totalPoints":17,"sprintSpan":1},{"id":"EP-3","title":"Account Linking","description":"Detection and resolution of email conflicts between SSO sign-ins and existing password accounts, plus the settings page flow for proactively linking accounts.","ticketIds":["SS-7","SS-8","SS-9"],"totalPoints":9,"sprintSpan":1},{"id":"EP-4","title":"Admin SSO Controls","description":"Org admin UI and API endpoints to enable/disable SSO providers per org and enforce SSO-only authentication for org members.","ticketIds":["SS-10","SS-11","SS-12"],"totalPoints":11,"sprintSpan":1},{"id":"EP-5","title":"Audit Log","description":"Recording, storage, and display of all auth events including sign-ins, failures, linking events, and admin config changes.","ticketIds":["SS-13","SS-14"],"totalPoints":8,"sprintSpan":1},{"id":"EP-6","title":"Login UI & SSO Entry Points","description":"Frontend changes to the login page, callback handling, and session expiry prompts to support SSO flows end-to-end.","ticketIds":["SS-15","SS-16","SS-17","SS-18"],"totalPoints":14,"sprintSpan":1},{"id":"EP-7","title":"QA & Security Hardening","description":"End-to-end test coverage, security review of the OAuth implementation, and validation of audit log completeness.","ticketIds":["SS-19","SS-20"],"totalPoints":13,"sprintSpan":1}],"tickets":[{"id":"SS-1","type":"story","epicId":"EP-1","title":"Design and migrate SSO identity and org config schema","userStory":"As a backend engineer, I want a well-structured database schema for SSO identities and org SSO configuration so that all OAuth features have a stable data foundation.","description":"Create migrations for three new tables: `sso_identities` (user_id FK, provider enum [google, microsoft], provider_subject, linked_at, last_used_at), `org_sso_config` (org_id FK, provider, enabled, forced, created_at, updated_at), and extend `audit_log` table (event_type, actor_user_id, org_id, provider, ip_address, user_agent, metadata JSONB, created_at). Index sso_identities on (provider, provider_subject) and (user_id). All FKs with appropriate cascade rules.","acceptanceCriteria":[{"given":"A clean database","when":"migrations are run","then":"all three tables exist with correct columns, constraints, and indexes"},{"given":"The migrations have been applied","when":"they are rolled back","then":"the database returns to its prior state without data loss to existing tables"},{"given":"Two sso_identity rows exist for the same provider and provider_subject","when":"a third insert is attempted","then":"a unique constraint violation is raised"}],"storyPoints":3,"skillArea":"backend","priority":"high","blockedBy":[],"blocks":["SS-2","SS-6","SS-10","SS-13"],"sprint":1,"rationale":"Three migrations with indexes and rollback scripts is roughly 1.5 days of careful schema work."},{"id":"SS-2","type":"story","epicId":"EP-1","title":"Create audit log service module","userStory":"As a backend engineer, I want a centralized audit log service so that any part of the auth system can record events consistently without duplicating logic.","description":"Implement a service/module (e.g., `AuditLogService.record(event)`) that accepts a typed event payload and writes to the `audit_log` table. Define an enum or constant set for event types: SSO_SIGN_IN_SUCCESS, SSO_SIGN_IN_FAILURE, PASSWORD_SIGN_IN_SUCCESS (extend existing), ACCOUNT_LINKED, ACCOUNT_LINK_FAILED, SSO_CONFIG_CHANGED. Writes should be non-blocking (fire-and-forget with error logging) so they never break the primary auth flow.","acceptanceCriteria":[{"given":"A valid event payload is passed to the service","when":"record() is called","then":"a row is inserted into audit_log with all required fields populated"},{"given":"The database write fails","when":"record() is called","then":"the error is logged to the application error logger and the calling function is not interrupted"},{"given":"An unknown event type is passed","when":"record() is called","then":"an error is thrown at the call site (fail fast at dev time)"}],"storyPoints":2,"skillArea":"backend","priority":"high","blockedBy":["SS-1"],"blocks":["SS-6","SS-10","SS-13"],"sprint":1,"rationale":"Straightforward service wrapper around a table insert with a typed enum; roughly one day of work."},{"id":"SS-3","type":"story","epicId":"EP-2","title":"Implement PKCE helper utilities","userStory":"As a backend engineer, I want reusable PKCE code verifier/challenge generation and validation utilities so that both Google and Microsoft flows share the same secure implementation.","description":"Implement `generateCodeVerifier()` (cryptographically random, 43-128 chars, URL-safe base64), `generateCodeChallenge(verifier)` (SHA-256, base64url), and `validateCodeVerifier(verifier, challenge)`. Store the verifier server-side in a short-lived (10 min TTL) cache or signed HTTP-only cookie keyed to a state parameter. Ensure the state parameter is also generated and validated per-request to prevent CSRF.","acceptanceCriteria":[{"given":"generateCodeVerifier is called","when":"the result is inspected","then":"it is between 43 and 128 URL-safe characters and is unique across calls"},{"given":"A code verifier is generated","when":"generateCodeChallenge is called with it","then":"the result matches the SHA-256/base64url spec and is reproducibly deterministic"},{"given":"A valid state parameter is received on callback","when":"it is validated against the stored value","then":"validation passes; for a tampered or missing state it fails with a 400 error"}],"storyPoints":2,"skillArea":"backend","priority":"high","blockedBy":[],"blocks":["SS-4","SS-5"],"sprint":1,"rationale":"Well-defined crypto utility with test cases; approximately one day including unit tests."},{"id":"SS-4","type":"story","epicId":"EP-2","title":"Implement Google OAuth authorization and callback endpoints","userStory":"As a user, I want to initiate a Google sign-in so that I am redirected to Google with a valid PKCE authorization request.","description":"Create GET /auth/google/authorize (builds the Google authorization URL with client_id, redirect_uri, scope [openid email profile], code_challenge, state; stores verifier; redirects user) and GET /auth/google/callback (receives code and state, validates state, exchanges code+verifier for tokens via Google's token endpoint, validates ID token signature using Google's JWKS, extracts email and sub claims). Read Google client_id and client_secret from environment variables. On success, proceed to user lookup (SS-6); on failure, redirect to login with error.","acceptanceCriteria":[{"given":"A user hits /auth/google/authorize","when":"the redirect is followed","then":"the user lands on accounts.google.com with valid client_id, redirect_uri, code_challenge_method=S256, and a state parameter"},{"given":"Google returns a valid authorization code to the callback","when":"the endpoint processes it","then":"the ID token is validated against Google's JWKS and the email and sub are extracted without error"},{"given":"The state parameter in the callback does not match the stored value","when":"the callback is processed","then":"the request is rejected with HTTP 400 and no session is issued"}],"storyPoints":5,"skillArea":"backend","priority":"high","blockedBy":["SS-3"],"blocks":["SS-6","SS-15","SS-20"],"sprint":1,"rationale":"Two endpoints, JWKS validation, error handling, and env config — roughly 2.5 days of careful implementation."},{"id":"SS-5","type":"story","epicId":"EP-2","title":"Implement Microsoft OAuth authorization and callback endpoints","userStory":"As a user, I want to sign in with my Microsoft account so that I can use my organization's Microsoft identity to access the app.","description":"Mirror SS-4 for Microsoft's Azure AD (v2.0) endpoints. Use the common tenant endpoint to support both personal and work accounts unless org-specific tenants are needed (flag as assumption). Validate the ID token using Microsoft's JWKS endpoint (keys.microsoft.com). Extract email (or preferred_username) and oid claims. Handle the nonce claim requirement in Microsoft ID tokens. Reuse PKCE utilities from SS-3.","acceptanceCriteria":[{"given":"A user hits /auth/microsoft/authorize","when":"the redirect is followed","then":"the user lands on login.microsoftonline.com/common/oauth2/v2.0/authorize with valid PKCE and state parameters"},{"given":"Microsoft returns a valid authorization code","when":"the callback processes it","then":"the ID token is validated against Microsoft's JWKS and oid plus email claims are extracted"},{"given":"The ID token nonce does not match the stored nonce","when":"validation runs","then":"the token is rejected and the user is redirected to login with an error"}],"storyPoints":5,"skillArea":"backend","priority":"high","blockedBy":["SS-3"],"blocks":["SS-6","SS-15","SS-20"],"sprint":1,"rationale":"Structurally identical to SS-4 but Microsoft has different JWKS, nonce requirements, and claim names — still roughly 2.5 days."},{"id":"SS-6","type":"story","epicId":"EP-2","title":"User lookup, auto-provisioning, and session issuance after SSO","userStory":"As a new user signing in via SSO, I want my account to be automatically created so that I can access the app without a separate registration step.","description":"After successful ID token validation, implement the user resolution logic: (1) Look up sso_identities by provider + provider_subject. If found, load the linked user and issue a JWT. (2) If no sso_identity exists, look up users by email. If email collision exists, trigger the account-linking flow (SS-8). (3) If no user exists at all, create a new user record (email, name from claims, email_verified=true), create the sso_identity, and issue a JWT. Session expiry should be min(id_token exp, 24h). Write SSO_SIGN_IN_SUCCESS or SSO_SIGN_IN_FAILURE to audit log.","acceptanceCriteria":[{"given":"An SSO sign-in for an email that has no existing account","when":"the callback completes","then":"a new user and sso_identity row are created and a valid JWT is returned"},{"given":"An SSO sign-in for a provider_subject that already has an sso_identity row","when":"the callback completes","then":"no new user is created and the existing user receives a JWT"},{"given":"A successful SSO sign-in","when":"the session is issued","then":"the JWT expiry is set to the lesser of the IdP token expiry and 24 hours"}],"storyPoints":5,"skillArea":"backend","priority":"high","blockedBy":["SS-1","SS-2","SS-4","SS-5"],"blocks":["SS-7","SS-9","SS-18","SS-19","SS-20"],"sprint":1,"rationale":"Three branching resolution paths plus audit logging and session expiry logic is about 2.5 days of work."},{"id":"SS-7","type":"story","epicId":"EP-3","title":"Detect email conflict and return linking challenge response","userStory":"As a user signing in via SSO with an email that already has a password account, I want to be informed of the conflict so that I can choose to link my accounts.","description":"Within the user resolution logic (SS-6), when an email match exists but no sso_identity, instead of creating a new user, return a structured response that the frontend can detect. Store a short-lived (15 min) signed linking token (containing provider, provider_subject, and email) in a server-side cache or signed cookie. The frontend will use this to initiate the account-linking confirmation flow. Do not expose provider_subject to the client.","acceptanceCriteria":[{"given":"A user signs in via SSO with an email matching an existing password account","when":"the callback completes","then":"no new user is created, no session is issued, and a linking_required response with a linking token is returned"},{"given":"A linking token is issued","when":"more than 15 minutes elapse","then":"the token is expired and attempting to use it returns a 401"}],"storyPoints":3,"skillArea":"backend","priority":"high","blockedBy":["SS-6"],"blocks":["SS-8"],"sprint":1,"rationale":"Branching within existing resolution logic plus secure short-lived token issuance is about 1.5 days."},{"id":"SS-8","type":"story","epicId":"EP-3","title":"Account linking endpoint: verify password and link SSO identity","userStory":"As a user who was prompted to link accounts, I want to confirm with my password so that my SSO identity is permanently linked to my existing account.","description":"Create POST /auth/link-sso that accepts the linking token and the user's current password. Verify the password against the existing bcrypt hash. If valid, create the sso_identity row connecting the provider+subject to the existing user, then issue a normal JWT session. Write an ACCOUNT_LINKED audit event. If password is wrong, increment failed attempt counter (reuse existing lockout logic) and return 401. Invalidate the linking token after use.","acceptanceCriteria":[{"given":"A valid linking token and correct password are submitted","when":"POST /auth/link-sso is called","then":"a new sso_identity row is created, a JWT session is issued, and the linking token is invalidated"},{"given":"A valid linking token but incorrect password are submitted","when":"POST /auth/link-sso is called","then":"a 401 is returned, no identity is created, and the failed attempt is counted toward lockout"},{"given":"An already-used or expired linking token is submitted","when":"POST /auth/link-sso is called","then":"a 401 is returned with an appropriate error message"}],"storyPoints":3,"skillArea":"backend","priority":"high","blockedBy":["SS-7"],"blocks":["SS-16","SS-19","SS-20"],"sprint":2,"rationale":"Single endpoint with password verification, identity insert, audit log, and token invalidation — about 1.5 days."},{"id":"SS-9","type":"story","epicId":"EP-3","title":"Link SSO identity from account settings","userStory":"As an existing user with a password account, I want to link my Google or Microsoft identity from my account settings so that I can use SSO to sign in going forward.","description":"Add a POST /account/sso/link/:provider endpoint (authenticated, requires active session). It initiates the standard PKCE flow but with a `link=true` flag stored in the state. After successful IdP callback, if the returned email matches the logged-in user's email, create the sso_identity. If the provider_subject is already linked to a different account, reject with a clear error. Write an ACCOUNT_LINKED audit event on success.","acceptanceCriteria":[{"given":"An authenticated user initiates linking for a provider","when":"the OAuth flow completes and the IdP email matches their account email","then":"an sso_identity row is created and a success response is returned"},{"given":"The returned IdP email does not match the authenticated user's email","when":"the callback is processed","then":"no identity is linked and a 422 error is returned explaining the mismatch"},{"given":"The provider_subject is already linked to a different user","when":"the callback is processed","then":"a 409 conflict error is returned and no changes are made"}],"storyPoints":3,"skillArea":"backend","priority":"medium","blockedBy":["SS-6"],"blocks":["SS-17"],"sprint":2,"rationale":"Reuses the PKCE flow with additional guards and a different terminal action — about 1.5 days."},{"id":"SS-10","type":"story","epicId":"EP-4","title":"Admin API: enable/disable SSO providers per org","userStory":"As an org admin, I want to enable or disable Google and Microsoft SSO for my organization so that I control which sign-in methods my team can use.","description":"Create PUT /orgs/:orgId/sso-config/:provider endpoint. Accepts `{ enabled: boolean }`. Requires org admin role. Upserts the org_sso_config row. Write an SSO_CONFIG_CHANGED audit event with the before/after state, admin's user_id, IP, and user agent. Return the updated config. Also create GET /orgs/:orgId/sso-config to return current config for all providers.","acceptanceCriteria":[{"given":"An org admin sends PUT with enabled: true for google","when":"the request is processed","then":"the org_sso_config row is upserted and an SSO_CONFIG_CHANGED audit event is written"},{"given":"A non-admin user calls the PUT endpoint","when":"the request is processed","then":"a 403 Forbidden is returned and no config changes are made"},{"given":"GET /orgs/:orgId/sso-config is called by an org admin","when":"the request is processed","then":"the current enabled/forced status for all providers is returned"}],"storyPoints":3,"skillArea":"backend","priority":"high","blockedBy":["SS-1","SS-2"],"blocks":["SS-11","SS-12"],"sprint":1,"rationale":"Two endpoints with role-gating and audit logging is straightforward at about 1.5 days."},{"id":"SS-11","type":"story","epicId":"EP-4","title":"Admin API: force SSO for an organization","userStory":"As an org admin, I want to enforce SSO-only sign-in for my org so that all members must authenticate through our identity provider.","description":"Extend PUT /orgs/:orgId/sso-config/:provider to accept `{ forced: boolean }`. When forced=true, the existing password sign-in endpoint should check if the user belongs to a forced-SSO org and reject password auth with a 403 and a message directing them to SSO. Forced mode should only be settable if the provider is also enabled. Write audit event on change.","acceptanceCriteria":[{"given":"An org has forced SSO enabled for a provider","when":"a member of that org attempts password sign-in","then":"a 403 is returned with a message indicating SSO is required for their organization"},{"given":"An admin tries to set forced=true when enabled=false","when":"the PUT request is processed","then":"a 422 validation error is returned explaining that the provider must be enabled first"},{"given":"An admin sets forced=true","when":"the change is saved","then":"an SSO_CONFIG_CHANGED audit event is written with before/after state"}],"storyPoints":3,"skillArea":"backend","priority":"high","blockedBy":["SS-10"],"blocks":["SS-12","SS-19"],"sprint":2,"rationale":"Extension of existing config endpoint plus a guard in the password auth path — about 1.5 days."},{"id":"SS-12","type":"story","epicId":"EP-4","title":"Admin UI: SSO configuration panel","userStory":"As an org admin, I want a settings panel to manage SSO providers for my org so that I can toggle and enforce them without using the API directly.","description":"Add an 'SSO' section to the org admin settings page. Display a card per provider (Google, Microsoft) showing: enabled toggle, force-SSO toggle (disabled unless enabled is on), current status badge, and a last-modified timestamp. Persist changes via the PUT endpoint from SS-10/SS-11. Show a confirmation modal when enabling force-SSO (warning about locking out password-only users). Display success/error toasts.","acceptanceCriteria":[{"given":"An org admin views the SSO settings panel","when":"the page loads","then":"the current enabled and forced state for each provider is accurately reflected"},{"given":"An admin toggles the force-SSO switch","when":"the confirmation modal is confirmed","then":"the API is called, the UI updates optimistically, and a success toast is shown"},{"given":"The force-SSO toggle is shown","when":"the provider is not yet enabled","then":"the force-SSO toggle is disabled and a tooltip explains why"}],"storyPoints":5,"skillArea":"frontend","priority":"high","blockedBy":["SS-10","SS-11"],"blocks":[],"sprint":2,"rationale":"Two provider cards, two toggles each, confirmation modal, and toast handling is about 2.5 days of UI work."},{"id":"SS-13","type":"story","epicId":"EP-5","title":"Admin API: auth event audit log endpoint","userStory":"As an org admin, I want to query the audit log for my organization so that I can review all authentication events.","description":"Create GET /orgs/:orgId/audit-log. Requires org admin role. Supports query params: event_type (multi-value), provider, user_id, date_from, date_to, page, page_size (max 100). Returns paginated results with total count. Each row exposes: id, event_type, actor_email (joined from users), provider, ip_address, user_agent, metadata, created_at. Never expose password hashes or tokens in metadata.","acceptanceCriteria":[{"given":"An org admin calls the endpoint with no filters","when":"the request is processed","then":"paginated audit events for that org are returned in descending created_at order"},{"given":"The endpoint is called with event_type=SSO_SIGN_IN_FAILURE and a date range","when":"the request is processed","then":"only matching events within the date range are returned"},{"given":"A non-admin calls the endpoint","when":"the request is processed","then":"a 403 is returned"}],"storyPoints":3,"skillArea":"backend","priority":"medium","blockedBy":["SS-1","SS-2"],"blocks":["SS-14"],"sprint":2,"rationale":"Filtered paginated read with a join is about 1.5 days including index verification."},{"id":"SS-14","type":"story","epicId":"EP-5","title":"Admin UI: audit log viewer","userStory":"As an org admin, I want to view and filter the authentication audit log in the admin dashboard so that I can investigate access events quickly.","description":"Add an 'Audit Log' tab to the admin area. Display a filterable, paginated table with columns: timestamp, event type (color-coded badge), user email, provider, IP address, user agent (truncated with tooltip). Add filter controls: event type multi-select, date range picker, user email search. Include a CSV export button that downloads the current filtered result set (client-side trigger to a separate export endpoint or by fetching all pages).","acceptanceCriteria":[{"given":"An org admin navigates to the Audit Log tab","when":"the page loads","then":"the 20 most recent auth events are displayed with correct columns"},{"given":"An admin applies an event type filter","when":"the filter is submitted","then":"the table updates to show only events of that type and the URL reflects the filter state"},{"given":"The admin clicks Export CSV","when":"the export completes","then":"a CSV file is downloaded containing all rows matching the current filter set"}],"storyPoints":5,"skillArea":"frontend","priority":"medium","blockedBy":["SS-13"],"blocks":[],"sprint":2,"rationale":"Filterable paginated table with date picker, multi-select, and CSV export is about 2.5 days of frontend work."},{"id":"SS-15","type":"story","epicId":"EP-6","title":"Add SSO buttons to the login page","userStory":"As a user, I want to see 'Sign in with Google' and 'Sign in with Microsoft' buttons on the login page so that I can initiate SSO sign-in without entering a password.","description":"Update the existing login page to add branded SSO buttons below the email/password form with an 'or' divider. Buttons should follow Google and Microsoft brand guidelines for OAuth buttons (colors, logos, copy). Clicking a button initiates a navigation to the backend authorize endpoint. If an org has SSO forced, the email/password form should be hidden (detectable via a pre-flight API call or URL param from org invite link). Show a loading state while the redirect is in progress.","acceptanceCriteria":[{"given":"A user visits the login page","when":"the page renders","then":"both SSO buttons are visible with correct branding and are accessible via keyboard"},{"given":"A user clicks 'Sign in with Google'","when":"the button is clicked","then":"the browser navigates to /auth/google/authorize and a loading indicator is shown"},{"given":"The user's org has force-SSO enabled","when":"the login page is rendered","then":"the email/password form is hidden and only the relevant SSO button is shown"}],"storyPoints":3,"skillArea":"frontend","priority":"high","blockedBy":["SS-4","SS-5"],"blocks":["SS-18"],"sprint":1,"rationale":"UI additions with brand compliance and one conditional display state — about 1.5 days."},{"id":"SS-16","type":"story","epicId":"EP-6","title":"Account linking prompt UI","userStory":"As a user whose SSO email matches an existing password account, I want a clear prompt to link my accounts so that I understand what is happening and can complete the process safely.","description":"Handle the `linking_required` response from the SSO callback on the frontend. Display a dedicated page/modal: 'An account with this email already exists. Enter your password to link your Google/Microsoft account.' Include the email (read-only), a password field, a 'Link Accounts' button, and a 'Cancel' link. On submit, POST to /auth/link-sso with the linking token and password. On success, redirect to the app. On password failure, show inline error. On cancel, redirect to login and clear the linking token.","acceptanceCriteria":[{"given":"The backend returns a linking_required response","when":"the frontend processes the callback","then":"the account linking prompt is displayed with the user's email pre-filled and read-only"},{"given":"The user submits the correct password on the linking prompt","when":"the API responds with success","then":"the user is redirected to the app dashboard with an active session"},{"given":"The user submits an incorrect password","when":"the API returns 401","then":"an inline error is shown and the form remains usable"}],"storyPoints":3,"skillArea":"frontend","priority":"high","blockedBy":["SS-8"],"blocks":["SS-19"],"sprint":2,"rationale":"Dedicated page with form, error state, and redirect logic is about 1.5 days of frontend work."},{"id":"SS-17","type":"story","epicId":"EP-6","title":"Account settings: manage linked SSO identities","userStory":"As a logged-in user, I want to view and manage my linked SSO providers from my account settings so that I can add or remove them as needed.","description":"Add a 'Sign-in Methods' section to the user account settings page. List currently linked SSO providers with the linked date. For each enabled (at org level) but unlinked provider, show a 'Connect' button that triggers the linking flow (SS-9). For linked providers, show a 'Disconnect' button (DELETE /account/sso/:provider). Block disconnection if the provider is the only sign-in method (no password set and no other linked provider).","acceptanceCriteria":[{"given":"A user with a linked Google account views their sign-in methods","when":"the page loads","then":"Google is shown as connected with the linked date and a 'Disconnect' button"},{"given":"A user attempts to disconnect their only sign-in method","when":"the disconnect button is clicked","then":"a warning is shown and the disconnect is blocked"},{"given":"A user clicks 'Connect' for an unlinked provider","when":"the OAuth flow completes successfully","then":"the provider appears as linked in the UI without a full page reload"}],"storyPoints":5,"skillArea":"fullstack","priority":"medium","blockedBy":["SS-9"],"blocks":[],"sprint":3,"rationale":"Requires a new API endpoint (DELETE), frontend section, and disconnect guard — about 2.5 days end-to-end."},{"id":"SS-18","type":"story","epicId":"EP-6","title":"SSO session expiry and re-authentication prompt","userStory":"As a user whose SSO session has expired, I want to be prompted to re-authenticate through my identity provider so that I can resume my work without losing context.","description":"When the JWT expires and was originally issued via SSO, the existing token refresh logic should detect the SSO origin (store provider in JWT claims) and instead of silently refreshing, show a non-dismissible modal: 'Your session has expired. Please sign in again with [Provider].' with a button to reinitiate the SSO flow. Pass a `post_auth_redirect` param so the user returns to their current page after re-auth. Password-originated sessions retain existing silent refresh behavior.","acceptanceCriteria":[{"given":"A user's SSO-issued JWT has expired","when":"the frontend detects the expiry","then":"a non-dismissible re-authentication modal is shown with the correct provider name"},{"given":"The user clicks 'Sign in with Google' on the expiry modal","when":"the SSO flow completes","then":"the user is returned to the page they were on before the session expired"},{"given":"A user's password-issued JWT expires","when":"the frontend detects the expiry","then":"the existing silent refresh behavior is used, not the SSO expiry modal"}],"storyPoints":3,"skillArea":"fullstack","priority":"medium","blockedBy":["SS-6","SS-15"],"blocks":["SS-19"],"sprint":3,"rationale":"JWT claim addition (backend) plus modal and redirect logic (frontend) together is about 1.5 days."},{"id":"SS-19","type":"story","epicId":"EP-7","title":"End-to-end tests for Google and Microsoft SSO flows","userStory":"As an engineer, I want automated end-to-end tests covering the critical SSO paths so that regressions are caught before they reach production.","description":"Write E2E tests (e.g., Playwright or Cypress) using mocked IdP responses (mock JWKS endpoint, stub token exchange). Cover: new user sign-in via Google, new user sign-in via Microsoft, returning user sign-in (existing sso_identity), account linking conflict flow, force-SSO org blocking password sign-in, and SSO session expiry modal. Use a test IdP stub or vcr-style fixtures rather than hitting real Google/Microsoft in CI.","acceptanceCriteria":[{"given":"The E2E suite runs in CI","when":"all tests pass","then":"coverage includes at minimum the 6 flows listed in the description"},{"given":"The mock IdP returns an invalid ID token","when":"the E2E test for token validation runs","then":"the test confirms the user is rejected with an appropriate error"},{"given":"The E2E tests run","when":"they complete","then":"they do not make real network calls to Google or Microsoft endpoints"}],"storyPoints":8,"skillArea":"qa","priority":"high","blockedBy":["SS-6","SS-8","SS-11","SS-16","SS-18"],"blocks":[],"sprint":3,"rationale":"Six complex flows with mock IdP setup, fixture management, and CI integration is close to a full week of QA work."},{"id":"SS-20","type":"story","epicId":"EP-7","title":"Security review of OAuth implementation","userStory":"As an engineering team, I want a structured security review of the SSO implementation so that common OAuth vulnerabilities are identified and resolved before launch.","description":"Conduct a security review against the OWASP OAuth 2.0 Security Best Practices checklist. Specifically verify: PKCE code_challenge is never logged, state an <header class="header">
  <div class="header-inner">
    <div>
      <div class="brand">spec-sprint</div>
      <h1 class="title" id="hdr-title">Sprint Plan</h1>
      <div class="subtitle" id="hdr-subtitle"></div>
    </div>
    <div class="stats" id="hdr-stats"></div>
  </div>
</header>

<div class="container">
  <div id="summary-section"></div>
  <div id="warnings-section"></div>
  <div id="ar-section"></div>
  <h2 style="margin:8px 0 16px;font-size:14px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Sprint overview</h2>
  <div id="sprint-overview" class="sprint-overview"></div>
  <div id="graph-section"></div>
  <h2 style="margin:24px 0 16px;font-size:14px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Sprints</h2>
  <div id="sprint-sections"></div>
  <div id="footer-section" class="footer"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<script>
(function() {
  'use strict';

  const SKILL_COLORS = {
    frontend: '#8b5cf6',
    backend: '#3b82f6',
    fullstack: '#06b6d4',
    data: '#f59e0b',
    infra: '#6b7280',
    qa: '#10b981',
    design: '#ec4899',
  };

  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') e.className = attrs[k];
        else if (k === 'html') e.innerHTML = attrs[k];
        else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
        else e.setAttribute(k, attrs[k]);
      }
    }
    for (const c of children) {
      if (c == null) continue;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    }
    return e;
  }

  function svgEl(tag, attrs) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function ptsClass(p) {
    if (p <= 3) return 'pts-low';
    if (p === 5) return 'pts-mid';
    return 'pts-high';
  }

  function utilColor(pct) {
    if (pct < 70) return '#f59e0b';
    if (pct > 95) return '#ef4444';
    return '#22c55e';
  }

  function truncate(s, n) {
    if (!s) return '';
    return s.length > n ? s.slice(0, n) + '...' : s;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---------- Render functions ----------
  function renderHeader(d) {
    const cfg = d.config;
    const parts = [];
    if (cfg.teamName) parts.push(cfg.teamName);
    if (cfg.sprintName) parts.push(cfg.sprintName);
    document.getElementById('hdr-title').textContent =
      parts.length ? parts.join(' • ') : 'Sprint Plan';
    const date = new Date(d.generatedAt).toLocaleString();
    document.getElementById('hdr-subtitle').textContent =
      'Generated ' + date + ' by spec-sprint v' + d.version;

    const stats = document.getElementById('hdr-stats');
    const ticketCount = d.decomposition.tickets.length;
    const totalPoints = d.decomposition.totalPoints;
    const sprintCount = d.sprintPlans.length;

    [
      [ticketCount, 'Tickets'],
      [totalPoints, 'Points'],
      [sprintCount, 'Sprints'],
      [cfg.teamSize + ' @ ' + cfg.velocity, 'Team / Velocity'],
    ].forEach(([num, label]) => {
      const s = el('div', { class: 'stat' },
        el('div', { class: 'stat-num' }, String(num)),
        el('div', { class: 'stat-label' }, label),
      );
      stats.appendChild(s);
    });
  }

  function renderSummary(d) {
    const root = document.getElementById('summary-section');
    const card = el('div', { class: 'card' },
      el('h2', null, 'Spec summary'),
      el('div', { class: 'spec-summary' }, d.decomposition.specSummary || '(no summary)'),
    );
    const toggle = el('span', { class: 'spec-toggle' }, 'View full spec →');
    const full = el('div', { class: 'spec-full' }, d.specText);
    toggle.addEventListener('click', () => {
      full.classList.toggle('open');
      toggle.textContent = full.classList.contains('open') ? 'Hide full spec ↑' : 'View full spec →';
    });
    card.appendChild(toggle);
    card.appendChild(full);
    root.appendChild(card);
  }

  function renderWarnings(d) {
    const root = document.getElementById('warnings-section');
    const all = [];
    d.sprintPlans.forEach(p => {
      p.warnings.forEach(w => all.push({ sprint: p.sprintNumber, text: w }));
    });
    if (!all.length) return;
    const card = el('div', { class: 'card warnings' });
    card.appendChild(el('h2', null, '⚠ Warnings (' + all.length + ')'));
    all.forEach((w, i) => {
      const row = el('div', { class: 'warning-row' },
        el('div', null, 'Sprint ' + w.sprint + ': ' + w.text),
      );
      const x = el('button', { class: 'warning-dismiss', title: 'Dismiss' }, '×');
      x.addEventListener('click', () => row.remove());
      row.appendChild(x);
      card.appendChild(row);
    });
    root.appendChild(card);
  }

  function renderAssumptionsRisks(d) {
    const root = document.getElementById('ar-section');
    const a = d.decomposition.assumptions || [];
    const r = d.decomposition.risks || [];
    if (!a.length && !r.length) return;

    function makeCard(cls, title, items) {
      const list = el('ul', { class: 'ar-list' });
      items.forEach(it => list.appendChild(el('li', null, it)));
      const header = el('div', { class: 'ar-header' },
        el('span', null, title + ' (' + items.length + ')'),
        el('span', null, '▾'),
      );
      header.addEventListener('click', () => list.classList.toggle('open'));
      return el('div', { class: 'ar-card ' + cls }, header, list);
    }

    const grid = el('div', { class: 'ar-grid' });
    grid.appendChild(makeCard('assumptions', 'Assumptions', a));
    grid.appendChild(makeCard('risks', 'Risks', r));
    root.appendChild(grid);
  }

  function renderSprintOverview(d) {
    const root = document.getElementById('sprint-overview');
    d.sprintPlans.forEach(p => {
      const card = el('div', { class: 'sprint-card' });
      const hdr = el('div', { class: 'sprint-card-header' },
        el('div', { class: 'sprint-card-title' }, 'Sprint ' + p.sprintNumber),
      );
      if (p.warnings.length) {
        hdr.appendChild(el('span', { class: 'warn-badge' }, String(p.warnings.length)));
      }
      card.appendChild(hdr);
      const bar = el('div', { class: 'util-bar' });
      const fill = el('div', { class: 'util-fill' });
      fill.style.width = Math.min(100, p.utilizationPct) + '%';
      fill.style.background = utilColor(p.utilizationPct);
      bar.appendChild(fill);
      card.appendChild(bar);
      card.appendChild(el('div', { class: 'util-text' },
        p.totalPoints + ' / ' + p.capacityPoints + ' pts (' + p.utilizationPct + '%)'));
      const skills = el('div', { class: 'skill-row' });
      Object.keys(p.skillBreakdown).forEach(s => {
        const span = el('span', { class: 'skill-dot' }, s + ': ' + p.skillBreakdown[s]);
        span.style.setProperty('--c', SKILL_COLORS[s] || '#888');
        skills.appendChild(span);
      });
      card.appendChild(skills);
      card.addEventListener('click', () => {
        const t = document.getElementById('sprint-sec-' + p.sprintNumber);
        if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      root.appendChild(card);
    });
  }

  // ---------- Dependency Graph (column per sprint) ----------
  function renderDependencyGraph(d) {
    const root = document.getElementById('graph-section');
    const graph = d.dependencyGraph;
    const tickets = d.decomposition.tickets;
    const byId = {};
    tickets.forEach(t => byId[t.id] = t);

    const card = el('div', { class: 'card graph-card' });
    card.appendChild(el('h2', null, 'Dependency graph'));
    const cpTitles = graph.criticalPath.map(id => id).join(' → ');
    const cpPts = graph.criticalPath.reduce((s, id) => s + (byId[id]?.storyPoints || 0), 0);
    card.appendChild(el('div', { class: 'graph-subtitle' },
      graph.criticalPath.length
        ? 'Critical path: ' + cpTitles + ' (' + cpPts + ' pts minimum)'
        : 'No dependencies between tickets.'));

    // Group nodes by sprint
    const sprintNums = [...new Set(graph.nodes.map(n => n.sprint).filter(x => x != null))].sort((a, b) => a - b);
    const hasUnassigned = graph.nodes.some(n => n.sprint == null);
    const cols = sprintNums.map(s => ({ key: s, label: 'Sprint ' + s, nodes: [] }));
    if (hasUnassigned) cols.push({ key: null, label: 'Unassigned', nodes: [] });

    graph.nodes.forEach(n => {
      const c = cols.find(c => c.key === n.sprint);
      if (c) c.nodes.push(n);
    });
    cols.forEach(c => {
      c.nodes.sort((a, b) => {
        if (a.isCriticalPath !== b.isCriticalPath) return a.isCriticalPath ? -1 : 1;
        return b.points - a.points;
      });
    });

    const NODE_W = 140;
    const NODE_H = 48;
    const COL_GAP = 60;
    const ROW_GAP = 16;
    const MARGIN_X = 30;
    const MARGIN_TOP = 40;

    const colCount = Math.max(1, cols.length);
    const maxRows = Math.max(1, ...cols.map(c => c.nodes.length));
    const width = MARGIN_X * 2 + colCount * NODE_W + (colCount - 1) * COL_GAP;
    const height = MARGIN_TOP + maxRows * (NODE_H + ROW_GAP) + 30;

    const wrap = el('div', { class: 'graph-svg-wrap' });
    const svg = svgEl('svg', {
      class: 'dep-graph',
      width: String(width),
      height: String(height),
      viewBox: '0 0 ' + width + ' ' + height,
    });

    // arrowhead defs
    const defs = svgEl('defs');
    [['arrow', '#6366f1', '0.6'], ['arrow-cp', '#ef4444', '0.85']].forEach(([id, color, op]) => {
      const m = svgEl('marker', {
        id, viewBox: '0 0 10 10', refX: '8', refY: '5',
        markerWidth: '8', markerHeight: '8', orient: 'auto-start-reverse',
      });
      const p = svgEl('path', { d: 'M 0 0 L 10 5 L 0 10 z', fill: color, 'fill-opacity': op });
      m.appendChild(p);
      defs.appendChild(m);
    });
    svg.appendChild(defs);

    // column headers
    cols.forEach((c, i) => {
      const x = MARGIN_X + i * (NODE_W + COL_GAP) + NODE_W / 2;
      const t = svgEl('text', { class: 'col-header', x: String(x), y: '20', 'text-anchor': 'middle' });
      t.textContent = c.label;
      svg.appendChild(t);
    });

    // node positions
    const positions = {};
    cols.forEach((c, ci) => {
      c.nodes.forEach((n, ri) => {
        const x = MARGIN_X + ci * (NODE_W + COL_GAP);
        const y = MARGIN_TOP + ri * (NODE_H + ROW_GAP);
        positions[n.id] = { x, y, w: NODE_W, h: NODE_H, node: n };
      });
    });

    // edges
    const edgeEls = [];
    const cpSet = new Set(graph.criticalPath);
    function isCpEdge(from, to) {
      const i = graph.criticalPath.indexOf(from);
      return i >= 0 && graph.criticalPath[i + 1] === to;
    }
    graph.edges.forEach(e => {
      const a = positions[e.from];
      const b = positions[e.to];
      if (!a || !b) return;
      const x1 = a.x + a.w;
      const y1 = a.y + a.h / 2;
      const x2 = b.x;
      const y2 = b.y + b.h / 2;
      const dx = Math.max(40, (x2 - x1) / 2);
      const cp = isCpEdge(e.from, e.to);
      const path = svgEl('path', {
        d: 'M ' + x1 + ' ' + y1 + ' C ' + (x1 + dx) + ' ' + y1 + ', ' + (x2 - dx) + ' ' + y2 + ', ' + x2 + ' ' + y2,
        fill: 'none',
        stroke: cp ? '#ef4444' : '#6366f1',
        'stroke-opacity': cp ? '0.8' : '0.6',
        'stroke-width': cp ? '2' : '1.2',
        'marker-end': 'url(#' + (cp ? 'arrow-cp' : 'arrow') + ')',
        class: 'edge',
        'data-from': e.from,
        'data-to': e.to,
      });
      svg.appendChild(path);
      edgeEls.push(path);
    });

    // nodes
    const nodeEls = [];
    Object.values(positions).forEach(p => {
      const n = p.node;
      const color = SKILL_COLORS[n.skillArea] || '#888';
      const g = svgEl('g', { 'data-id': n.id, class: 'node-group' });
      const rect = svgEl('rect', {
        class: 'node-rect',
        x: String(p.x),
        y: String(p.y),
        width: String(p.w),
        height: String(p.h),
        rx: '6',
        fill: color,
        'fill-opacity': '0.2',
        stroke: n.isCriticalPath ? '#ef4444' : color,
        'stroke-width': n.isCriticalPath ? '2' : '1',
      });
      g.appendChild(rect);
      const idText = svgEl('text', {
        class: 'node-text',
        x: String(p.x + 8),
        y: String(p.y + 18),
      });
      idText.textContent = n.id + ' · ' + n.points + 'pt';
      g.appendChild(idText);
      const titleText = svgEl('text', {
        class: 'node-title-text',
        x: String(p.x + 8),
        y: String(p.y + 34),
      });
      titleText.textContent = truncate(n.title, 18);
      g.appendChild(titleText);

      g.addEventListener('mouseenter', () => highlightNode(n.id));
      g.addEventListener('mouseleave', () => clearHighlight());
      g.addEventListener('click', (ev) => {
        ev.stopPropagation();
        openTicketModal(n.id);
      });

      svg.appendChild(g);
      nodeEls.push(g);
    });

    function highlightNode(id) {
      const connected = new Set([id]);
      graph.edges.forEach(e => {
        if (e.from === id) connected.add(e.to);
        if (e.to === id) connected.add(e.from);
      });
      nodeEls.forEach(g => {
        if (connected.has(g.getAttribute('data-id'))) g.classList.remove('dim');
        else g.classList.add('dim');
      });
      edgeEls.forEach(p => {
        if (p.getAttribute('data-from') === id || p.getAttribute('data-to') === id) {
          p.classList.remove('dim');
        } else {
          p.classList.add('dim');
        }
      });
    }
    function clearHighlight() {
      nodeEls.forEach(g => g.classList.remove('dim'));
      edgeEls.forEach(p => p.classList.remove('dim'));
    }

    svg.addEventListener('click', clearHighlight);
    wrap.appendChild(svg);
    card.appendChild(wrap);
    root.appendChild(card);
  }

  // ---------- Sprint sections (tables) ----------
  function renderSprintSections(d) {
    const root = document.getElementById('sprint-sections');
    const byId = {};
    d.decomposition.tickets.forEach(t => byId[t.id] = t);

    d.sprintPlans.forEach(p => {
      const sec = el('div', { class: 'sprint-section', id: 'sprint-sec-' + p.sprintNumber });

      const fillColor = utilColor(p.utilizationPct);
      const utilBar = el('div', { class: 'util-mini' });
      const utilFill = el('div', { class: 'util-fill' });
      utilFill.style.width = Math.min(100, p.utilizationPct) + '%';
      utilFill.style.background = fillColor;
      utilBar.appendChild(utilFill);

      const stats = el('div', { class: 'sprint-section-stats' },
        el('span', null, p.totalPoints + ' / ' + p.capacityPoints + ' pts (' + p.utilizationPct + '%)'),
        utilBar,
      );
      const header = el('div', { class: 'sprint-section-header' },
        el('div', { class: 'sprint-section-title' }, 'Sprint ' + p.sprintNumber),
        stats,
      );
      sec.appendChild(header);

      const meta = el('div', { class: 'sprint-meta' });
      Object.keys(p.skillBreakdown).forEach(s => {
        const span = el('span', null, s.charAt(0).toUpperCase() + s.slice(1) + ': ' + p.skillBreakdown[s] + 'pts');
        span.style.color = SKILL_COLORS[s] || 'var(--text-muted)';
        meta.appendChild(span);
      });
      sec.appendChild(meta);

      if (p.warnings.length) {
        const w = el('div', { class: 'sprint-warnings' });
        p.warnings.forEach(msg => w.appendChild(el('div', null, '⚠ ' + msg)));
        sec.appendChild(w);
      }

      const body = el('div', { class: 'sprint-body' });

      const table = el('table', { class: 'tickets' });
      const thead = el('thead', null,
        el('tr', null,
          el('th', null, 'ID'),
          el('th', null, 'Title'),
          el('th', null, 'User Story'),
          el('th', null, 'Points'),
          el('th', null, 'Skill'),
          el('th', null, 'Priority'),
          el('th', null, 'Blocked By'),
          el('th', null, 'Copy'),
        ));
      table.appendChild(thead);
      const tbody = el('tbody');

      p.ticketIds.forEach(id => {
        const t = byId[id];
        if (!t) return;
        const tr = el('tr');

        const idBadge = el('span', { class: 'badge id-badge' }, t.id);
        idBadge.addEventListener('click', () => openTicketModal(t.id));
        tr.appendChild(el('td', null, idBadge));

        const titleCell = el('td', { class: 'title-cell' }, t.title);
        titleCell.addEventListener('click', () => openTicketModal(t.id));
        tr.appendChild(titleCell);

        const storyCell = el('td', { class: 'story-cell', title: t.userStory },
          truncate(t.userStory, 60));
        storyCell.addEventListener('click', () => openTicketModal(t.id));
        tr.appendChild(storyCell);

        tr.appendChild(el('td', null,
          el('span', { class: 'badge pts-badge ' + ptsClass(t.storyPoints) }, String(t.storyPoints))));
        tr.appendChild(el('td', null,
          el('span', { class: 'badge skill-badge skill-' + t.skillArea }, t.skillArea)));
        tr.appendChild(el('td', null,
          el('span', { class: 'badge pri-badge pri-' + t.priority }, t.priority)));

        const depCell = el('td');
        if (t.blockedBy.length) {
          t.blockedBy.forEach(b => {
            const chip = el('span', { class: 'dep-chip', title: 'Jump to ' + b }, b);
            chip.addEventListener('click', () => openTicketModal(b));
            depCell.appendChild(chip);
          });
        } else {
          depCell.textContent = '—';
          depCell.style.color = 'var(--text-muted)';
        }
        tr.appendChild(depCell);

        const copyCell = el('td');
        const btns = el('div', { class: 'copy-btns' });
        btns.appendChild(makeCopyBtn('J', 'Copy as Jira', () => formatJira(t)));
        btns.appendChild(makeCopyBtn('L', 'Copy as Linear', () => formatLinear(t)));
        btns.appendChild(makeCopyBtn('P', 'Copy as plain text', () => formatPlain(t)));
        copyCell.appendChild(btns);
        tr.appendChild(copyCell);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      body.appendChild(table);

      // sprint-level copy
      const footer = el('div', { class: 'sprint-footer-copy' });
      const ticketObjs = p.ticketIds.map(id => byId[id]).filter(Boolean);
      footer.appendChild(makeCopyBtnLarge('📋 All tickets — Jira format', () => formatSprintJira(p, ticketObjs)));
      footer.appendChild(makeCopyBtnLarge('📋 Markdown table', () => formatSprintMarkdown(p, ticketObjs)));
      footer.appendChild(makeCopyBtnLarge('📋 Slack summary', () => formatSprintSlack(p, ticketObjs, d.dependencyGraph)));
      body.appendChild(footer);

      sec.appendChild(body);

      header.addEventListener('click', () => body.classList.toggle('collapsed'));

      root.appendChild(sec);
    });
  }

  function makeCopyBtn(label, title, getText) {
    const btn = el('button', { class: 'copy-btn', title }, label);
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      doCopy(btn, getText());
    });
    return btn;
  }
  function makeCopyBtnLarge(label, getText) {
    const btn = el('button', { class: 'copy-btn copy-btn-large' }, label);
    btn.addEventListener('click', () => doCopy(btn, getText()));
    return btn;
  }

  function doCopy(btn, text) {
    copyToClipboard(text).then(ok => {
      const orig = btn.textContent;
      btn.textContent = ok ? '✓' : '✗';
      btn.classList.add(ok ? 'success' : 'error');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('success', 'error');
      }, 1500);
    });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(() => true).catch(() => fallback(text));
    }
    return Promise.resolve(fallback(text));
  }
  function fallback(text) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  // ---------- Format helpers ----------
  function acText(ac) {
    return ac.map(a => '• Given ' + a.given + ', when ' + a.when + ', then ' + a.then).join('\n');
  }
  function acLinear(ac) {
    return ac.map(a => '- [ ] Given ' + a.given + ', when ' + a.when + ', then ' + a.then).join('\n');
  }
  function acNumbered(ac) {
    return ac.map((a, i) => '  ' + (i + 1) + '. Given ' + a.given + ', when ' + a.when + ', then ' + a.then).join('\n');
  }

  function formatJira(t) {
    const lines = [];
    lines.push(t.title);
    lines.push('');
    lines.push('User Story');
    lines.push(t.userStory);
    lines.push('');
    lines.push('Description');
    lines.push(t.description);
    lines.push('');
    lines.push('Acceptance Criteria');
    lines.push(acText(t.acceptanceCriteria));
    lines.push('');
    lines.push('Story Points: ' + t.storyPoints);
    lines.push('Skill Area: ' + t.skillArea);
    lines.push('Priority: ' + t.priority);
    if (t.blockedBy.length) lines.push('Blocked By: ' + t.blockedBy.join(', '));
    lines.push('Estimate rationale: ' + t.rationale);
    return lines.join('\n');
  }

  function formatLinear(t) {
    const lines = [];
    lines.push(t.title);
    lines.push('');
    lines.push(t.userStory);
    lines.push('');
    lines.push('Context');
    lines.push(t.description);
    lines.push('');
    lines.push('Acceptance Criteria');
    lines.push(acLinear(t.acceptanceCriteria));
    lines.push('');
    lines.push('Points: ' + t.storyPoints + '  Area: ' + t.skillArea + '  Priority: ' + t.priority);
    if (t.blockedBy.length) lines.push('Blocked by: ' + t.blockedBy.join(', '));
    return lines.join('\n');
  }

  function formatPlain(t) {
    const lines = [];
    lines.push('[' + t.id + '] ' + t.title);
    lines.push('Story: ' + t.userStory);
    lines.push('Points: ' + t.storyPoints + ' | Skill: ' + t.skillArea + ' | Priority: ' + t.priority);
    if (t.blockedBy.length) lines.push('Blocked by: ' + t.blockedBy.join(', '));
    lines.push('Acceptance Criteria:');
    lines.push(acNumbered(t.acceptanceCriteria));
    return lines.join('\n');
  }

  function formatSprintJira(plan, tickets) {
    return tickets.map(formatJira).join('\n---\n');
  }

  function formatSprintMarkdown(plan, tickets) {
    const lines = [];
    lines.push('| ID | Title | Points | Skill | Priority | Blocked By |');
    lines.push('|---|---|---|---|---|---|');
    tickets.forEach(t => {
      lines.push('| ' + t.id + ' | ' + t.title + ' | ' + t.storyPoints + ' | ' + t.skillArea + ' | ' + t.priority + ' | ' + (t.blockedBy.length ? t.blockedBy.join(', ') : '—') + ' |');
    });
    return lines.join('\n');
  }

  function formatSprintSlack(plan, tickets, graph) {
    const lines = [];
    lines.push('*Sprint ' + plan.sprintNumber + ' Plan* — ' + plan.totalPoints + ' pts / ' + plan.capacityPoints + ' capacity (' + plan.utilizationPct + '%)');
    lines.push('');
    tickets.forEach(t => {
      lines.push('• [' + t.id + '] ' + t.title + ' (' + t.storyPoints + 'pts, ' + t.skillArea + ')');
    });
    if (plan.criticalPathIds && plan.criticalPathIds.length) {
      const titles = plan.criticalPathIds.map(id => {
        const t = tickets.find(x => x.id === id);
        return t ? t.title : id;
      }).join(' → ');
      lines.push('');
      lines.push('_Critical path: ' + titles + '_');
    }
    if (plan.warnings.length) {
      lines.push('_⚠ ' + plan.warnings.join(' | ') + '_');
    }
    return lines.join('\n');
  }

  // ---------- Modal ----------
  function openTicketModal(id) {
    const data = window.SPEC_SPRINT_DATA;
    const t = data.decomposition.tickets.find(x => x.id === id);
    if (!t) return;
    const modal = document.getElementById('modal');
    modal.innerHTML = '';

    const epic = data.decomposition.epics.find(e => e.id === t.epicId);

    const head = el('div', { class: 'modal-header' },
      el('span', { class: 'badge id-badge' }, t.id),
      el('h3', null, t.title),
    );
    const close = el('button', { class: 'modal-close', title: 'Close' }, '×');
    close.addEventListener('click', closeModal);
    head.appendChild(close);
    modal.appendChild(head);

    if (epic) {
      modal.appendChild(el('div', { class: 'muted', style: 'font-size:12px;margin-bottom:8px;' },
        epic.id + ' — ' + epic.title));
    }

    const row = el('div', { class: 'modal-row' });
    if (t.sprint != null) row.appendChild(el('span', { class: 'badge id-badge' }, 'Sprint ' + t.sprint));
    row.appendChild(el('span', { class: 'badge pts-badge ' + ptsClass(t.storyPoints) }, t.storyPoints + ' pts'));
    row.appendChild(el('span', { class: 'badge skill-badge skill-' + t.skillArea }, t.skillArea));
    row.appendChild(el('span', { class: 'badge pri-badge pri-' + t.priority }, t.priority));
    modal.appendChild(row);

    modal.appendChild(el('div', { class: 'modal-section' },
      el('div', { class: 'modal-section-label' }, 'User story'),
      el('div', { class: 'modal-user-story' }, t.userStory),
    ));
    modal.appendChild(el('div', { class: 'modal-section' },
      el('div', { class: 'modal-section-label' }, 'Description'),
      el('div', null, t.description),
    ));

    const acList = el('ol', { class: 'modal-ac' });
    t.acceptanceCriteria.forEach(a => {
      acList.appendChild(el('li', null, 'Given ' + a.given + ', when ' + a.when + ', then ' + a.then));
    });
    modal.appendChild(el('div', { class: 'modal-section' },
      el('div', { class: 'modal-section-label' }, 'Acceptance criteria'),
      acList,
    ));

    if (t.blockedBy.length) {
      const chips = el('div');
      t.blockedBy.forEach(b => {
        const c = el('span', { class: 'dep-chip' }, b);
        c.addEventListener('click', () => openTicketModal(b));
        chips.appendChild(c);
      });
      modal.appendChild(el('div', { class: 'modal-section' },
        el('div', { class: 'modal-section-label' }, 'Blocked by'),
        chips,
      ));
    }
    if (t.blocks && t.blocks.length) {
      const chips = el('div');
      t.blocks.forEach(b => {
        const c = el('span', { class: 'dep-chip' }, b);
        c.addEventListener('click', () => openTicketModal(b));
        chips.appendChild(c);
      });
      modal.appendChild(el('div', { class: 'modal-section' },
        el('div', { class: 'modal-section-label' }, 'Blocks'),
        chips,
      ));
    }
    if (t.rationale) {
      modal.appendChild(el('div', { class: 'modal-section' },
        el('div', { class: 'modal-section-label' }, 'Estimate rationale'),
        el('div', { class: 'modal-rationale' }, t.rationale),
      ));
    }

    const actions = el('div', { class: 'modal-actions' });
    actions.appendChild(makeCopyBtn('Copy for Jira', 'Copy for Jira', () => formatJira(t)));
    actions.appendChild(makeCopyBtn('Copy for Linear', 'Copy for Linear', () => formatLinear(t)));
    actions.appendChild(makeCopyBtn('Copy Plain Text', 'Copy plain text', () => formatPlain(t)));
    modal.appendChild(actions);

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  // expose
  window.openTicketModal = openTicketModal;

  // ---------- Footer ----------
  function renderFooter(d) {
    const root = document.getElementById('footer-section');
    root.appendChild(el('div', null,
      'Generated by spec-sprint v' + d.version + ' • github.com/YOUR_GITHUB_USERNAME/spec-sprint'));
    root.appendChild(el('div', null,
      'Estimates are starting points for team discussion, not commitments.'));
    root.appendChild(el('div', null, new Date(d.generatedAt).toLocaleString()));
  }

  // ---------- Boot ----------
  document.addEventListener('DOMContentLoaded', function () {
    const data = window.SPEC_SPRINT_DATA;
    if (!data) {
      document.body.innerHTML = '<div style="padding:40px;color:#fff">No data</div>';
      return;
    }
    renderHeader(data);
    renderSummary(data);
    renderWarnings(data);
    renderAssumptionsRisks(data);
    renderSprintOverview(data);
    renderDependencyGraph(data);
    renderSprintSections(data);
    renderFooter(data);

    document.getElementById('modal-overlay').addEventListener('click', function (e) {
      if (e.target.id === 'modal-overlay') closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  });
})();
</script>
